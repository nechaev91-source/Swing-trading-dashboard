<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.json" />
  <title>Swing Trading Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ░░ AUTH SCREEN ░░ -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-logo">📈</div>
      <h1>Swing Trading Dashboard</h1>
      <p class="auth-sub">Sign in to access your trades on any device.</p>
      <input type="email" id="auth-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
      <div id="auth-error" class="auth-error"></div>
      <button id="auth-login-btn" class="btn btn-primary">Sign In</button>
      <button id="auth-signup-btn" class="btn btn-ghost">Create Account</button>
    </div>
  </div>

  <!-- ░░ APP SHELL ░░ -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Sidebar (desktop) / bottom-nav (mobile) -->
    <nav class="sidebar">
      <div class="sidebar-logo">📈 <span>Swing</span></div>
      <a href="#dashboard" class="nav-item" data-view="dashboard"><span class="ico">📊</span><span class="lbl">Dashboard</span></a>
      <a href="#new" class="nav-item" data-view="new"><span class="ico">🎯</span><span class="lbl">New Trade</span></a>
      <a href="#ideas" class="nav-item" data-view="ideas"><span class="ico">💡</span><span class="lbl">Ideas</span></a>
      <a href="#positions" class="nav-item" data-view="positions"><span class="ico">📍</span><span class="lbl">Positions</span></a>
      <a href="#journal" class="nav-item" data-view="journal"><span class="ico">📓</span><span class="lbl">Journal</span></a>
      <a href="#analytics" class="nav-item" data-view="analytics"><span class="ico">📉</span><span class="lbl">Analytics</span></a>
      <a href="#import" class="nav-item" data-view="import"><span class="ico">📥</span><span class="lbl">Import</span></a>
      <a href="#settings" class="nav-item" data-view="settings"><span class="ico">⚙️</span><span class="lbl">Settings</span></a>
      <div class="sidebar-spacer"></div>
      <button id="logout-btn" class="nav-item logout"><span class="ico">🚪</span><span class="lbl">Sign Out</span></button>
    </nav>

    <!-- Main content -->
    <main id="view-container" class="view-container"></main>
  </div>

  <!-- Global loading overlay -->
  <div id="loader" class="loader hidden"><div class="spinner"></div></div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
